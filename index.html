<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        main{
            width: 100%;
            height: 99.6vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            width: 100%;
            height: 100vh;
            border: 2px solid grey;
            background: lightgray;
            overflow: hidden;
            text-align: center;
        }
        .container>h1{
            position: relative;
            top: 15px;
            font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            letter-spacing: 1.5px;
            color: darkblue;
        }
        .container>.colorsBox{
            margin: 0 auto;
            margin-top: 25px;
            width: 95%;
            height: 70%;
            background: rgb(255, 255, 255);
            border-radius: 15px;
            border:  25px solid black;
            display: flex;
            justify-content: center;
            align-items: end;
        }
        #rgbColorNumber{
            padding: 2px 15px;
            font-size: 1.5rem;
            letter-spacing: 1.5px;
            position: relative;
            bottom: 20px;
            background: lightgray;
            text-align: center;
        }
        .stand1{
            margin: 0 auto;
            width: 150px;
            height: 110px;
            background: black;
        }
        .stand2{
            margin: 0 auto;
            width: 600px;
            height: 20px;
            background: black;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <!-- <h1>Random Color Picker</h1> -->
            <h1>A color show, it's free</h1>
            <br>
            <div class="colorsBox">
                <!-- This div display random color generates every 1s and his rgb code will display on the screen -->
                <h2 id="rgbColorNumber">rgb(255,255,255)</h2>
                <!-- default it show white color and pass directly white RGB color code in <h2> tag -->
            </div>
            <div class="stand1"></div>
            <div class="stand2"></div>
        </div>
    </main>

    <!-- Script link -->
     <script src="./index.js"></script>
</body>
</html>
